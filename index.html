      PERF FIX: Google Fonts moved from CSS @import to <link> here.
      @import in CSS is render-blocking and serial; <link> here is
      parallel and lets the browser discover fonts earlier.
      preconnect hints let the browser open the TCP/TLS handshake ASAP.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
